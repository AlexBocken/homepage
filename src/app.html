<!DOCTYPE html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, viewport-fit=cover" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#5E81AC" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#2E3440" />
		<link rel="apple-touch-icon" href="/favicon-192.png" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Bocken" />
		<script>
			(function() {
				var t = localStorage.getItem('theme');
				if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
			})();
		</script>
		%sveltekit.head%
		<!-- Fallback title: a page's own <svelte:head><title> (emitted in %sveltekit.head% above)
		     appears first in the document and wins; this only applies to pages that set none. -->
		<title>Bocken</title>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
